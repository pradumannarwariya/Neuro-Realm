<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-READER v2.0 | Praduman Narwariya</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* CSS Variables for Dynamic Zoom and Theming */
        :root {
            --book-width: 800px; /* 400px per page * 2 pages */
            --book-height: 600px;
            
            /* Theme Colors */
            --theme-black: #0a0a0a;
            --theme-grey: #1f1f24;
            --theme-magenta: #ff66ff;
            --theme-blue: #33aaff;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background-color: var(--theme-black);
            background-image: 
                linear-gradient(rgba(51, 170, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(51, 170, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden; /* Prevent body scroll, handled by internal panning */
        }

        /* --- Header & Layout --- */
        .cyber-header {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px 30px;
            border: 2px solid var(--theme-blue);
            background-color: var(--theme-grey);
            box-shadow: 0 0 15px rgba(51, 170, 255, 0.2);
            border-radius: 8px;
            width: 100%;
            max-width: 950px;
            box-sizing: border-box;
        }

        .cyber-header h1 {
            margin: 0;
            color: var(--theme-magenta);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 102, 255, 0.5);
        }

        .cyber-header p { margin: 10px 0 0; color: #aaaaaa; font-size: 14px; }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 950px;
        }

        /* --- Input & Control Styling --- */
        .upload-section { margin-bottom: 20px; display: flex; justify-content: center; width: 100%; }
        input[type="file"] { display: none; }

        .cyber-btn {
            padding: 8px 14px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid var(--theme-blue);
            border-radius: 5px;
            background-color: var(--theme-grey);
            color: var(--theme-blue);
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            transition: all 0.3s ease;
            outline: none;
        }

        .cyber-btn:hover {
            border-color: var(--theme-magenta);
            color: var(--theme-magenta);
            box-shadow: 0 0 10px rgba(255, 102, 255, 0.4);
            background-color: #2a2a35;
        }

        .cyber-btn:active { transform: scale(0.95); }

        /* --- Control Panel Styling --- */
        #control-panel {
            display: none; 
            background-color: var(--theme-grey);
            border: 1px solid var(--theme-blue);
            border-radius: 8px;
            padding: 15px 20px;
            margin-top: 20px;
            margin-bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            box-sizing: border-box;
        }

        .control-group { display: flex; gap: 8px; align-items: center; }

        .page-display { 
            font-weight: bold; color: #ffffff; font-size: 14px; min-width: 110px; text-align: center;
        }
        .page-display span { color: var(--theme-magenta); }

        .jump-input {
            width: 50px; background-color: var(--theme-black); border: 1px solid var(--theme-blue);
            color: var(--theme-magenta); padding: 6px; border-radius: 4px; text-align: center;
            font-family: 'Orbitron', sans-serif;
        }
        .jump-input:focus { outline: none; border-color: var(--theme-magenta); }

        /* --- Flipbook Viewport --- */
        .flipbook-container {
            display: none; 
            position: relative;
            width: 100%;
            height: 60vh; /* Responsive height for the tablet screen concept */
            min-height: 400px;
            border: 1px solid var(--theme-blue);
            background-color: var(--theme-black);
            overflow: hidden; /* Crucial for panning boundary enforcement */
            border-radius: 8px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        #flipbook {
            border: 2px solid var(--theme-grey);
            background-color: #fff;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.8);
            /* Transform origin must be top left for the controller matrix logic */
            transform-origin: top left;
            /* Transition removed from transform to make panning instantly responsive */
        }

        .page {
            background-color: #f9f9f9; color: #555; border: 1px solid #ddd;
            box-sizing: border-box; font-size: 14px; display: flex;
            justify-content: center; align-items: center; text-align: center;
        }
        .page canvas { display: block; max-width: 100%; max-height: 100%; }

        /* Fullscreen styles */
        :-webkit-full-screen .flipbook-container { height: 100vh; border: none; border-radius: 0; }
        :fullscreen .flipbook-container { height: 100vh; border: none; border-radius: 0; }

        /* --- Footer --- */
        .cyber-footer {
            margin-top: auto; padding: 10px 0; text-align: center; width: 100%;
            border-top: 1px solid var(--theme-grey); color: #888; font-size: 13px; letter-spacing: 1px;
        }
        .creator-name { font-weight: bold; color: var(--theme-blue); }
    </style>
</head>
<body>

    <header class="cyber-header">
        <h1>// Cyber-Reader</h1>
        <p>Interactive Large Document Interface</p>
    </header>

    <main class="main-content">
        <section class="upload-section">
            <label for="pdf-upload" class="cyber-btn" id="upload-btn-label">Open PDF File</label>
            <input type="file" id="pdf-upload" accept="application/pdf">
        </section>

        <div class="flipbook-container" id="viewer-container">
            <div id="flipbook"></div>
        </div>

        <div id="control-panel">
            <div class="control-group">
                <button id="first-page" class="cyber-btn" title="First Page">|&lt;</button>
                <button id="prev-page" class="cyber-btn" title="Previous Page">&lt;</button>
                <div class="page-display" id="page-counter">PG <span>--</span> / --</div>
                <button id="next-page" class="cyber-btn" title="Next Page">&gt;</button>
                <button id="last-page" class="cyber-btn" title="Last Page">&gt;|</button>
            </div>
            
            <div class="control-group">
                <input type="number" id="jump-page-input" class="jump-input" placeholder="#" min="1">
                <button id="jump-go" class="cyber-btn" title="Jump to Page">Go</button>
            </div>

            <div class="control-group">
                <button id="pan-left" class="cyber-btn" title="Pan Left">←</button>
                <button id="pan-up" class="cyber-btn" title="Pan Up">↑</button>
                <button id="pan-down" class="cyber-btn" title="Pan Down">↓</button>
                <button id="pan-right" class="cyber-btn" title="Pan Right">→</button>
            </div>

            <div class="control-group">
                <button id="zoom-out" class="cyber-btn" title="Zoom Out">-</button>
                <button id="zoom-in" class="cyber-btn" title="Zoom In">+</button>
                <button id="fit-screen" class="cyber-btn" title="Fit to Screen">Fit</button>
                <button id="toggle-fullscreen" class="cyber-btn" title="Toggle Full Screen">[ ]</button>
            </div>
        </div>
    </main>

    <footer class="cyber-footer">
        Engineered by <span class="creator-name">Praduman Narwariya</span>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // --- Controller Class for Zoom/Pan/Fit ---
        class FlipbookController {
            constructor(element, bookWidth, bookHeight, maxScale = 3.0, zoomStep = 0.1, panStep = 50) {
                this.element = element;
                this.bookWidth = bookWidth;
                this.bookHeight = bookHeight;
                this.screenWidth = 0;
                this.screenHeight = 0;
                this.scale = 1;
                this.posX = 0;
                this.posY = 0;
                this.minScale = 0.1; // Allow zooming out slightly beyond fit if desired, or lock it in fitToScreen
                this.maxScale = maxScale;
                this.zoomStep = zoomStep;
                this.panStep = panStep;
            }

            fitToScreen(viewportWidth, viewportHeight) {
                this.screenWidth = viewportWidth;
                this.screenHeight = viewportHeight;
                const scaleX = this.screenWidth / this.bookWidth;
                const scaleY = this.screenHeight / this.bookHeight;
                
                this.scale = Math.min(scaleX, scaleY);
                this.minScale = this.scale; // Lock min scale to the viewport fit

                this.centerBook();
                this.applyTransform();
            }

            centerBook() {
                this.posX = (this.screenWidth - (this.bookWidth * this.scale)) / 2;
                this.posY = (this.screenHeight - (this.bookHeight * this.scale)) / 2;
            }

            zoom(direction) {
                const oldScale = this.scale;
                let newScale = this.scale + (direction * this.zoomStep);
                this.scale = Math.max(this.minScale, Math.min(newScale, this.maxScale));

                const scaleRatio = this.scale / oldScale;
                const centerX = this.screenWidth / 2;
                const centerY = this.screenHeight / 2;

                this.posX = centerX - ((centerX - this.posX) * scaleRatio);
                this.posY = centerY - ((centerY - this.posY) * scaleRatio);

                this.enforceBoundaries();
                this.applyTransform();
            }

            pan(deltaX, deltaY) {
                this.posX += deltaX * this.panStep;
                this.posY += deltaY * this.panStep;
                this.enforceBoundaries();
                this.applyTransform();
            }

            enforceBoundaries() {
                const currentBookWidth = this.bookWidth * this.scale;
                const currentBookHeight = this.bookHeight * this.scale;

                if (currentBookWidth <= this.screenWidth) {
                    this.posX = (this.screenWidth - currentBookWidth) / 2;
                } else {
                    this.posX = Math.min(0, Math.max(this.posX, this.screenWidth - currentBookWidth));
                }

                if (currentBookHeight <= this.screenHeight) {
                    this.posY = (this.screenHeight - currentBookHeight) / 2;
                } else {
                    this.posY = Math.min(0, Math.max(this.posY, this.screenHeight - currentBookHeight));
                }
            }

            applyTransform() {
                this.element.style.transform = `translate(${this.posX}px, ${this.posY}px) scale(${this.scale})`;
            }
        }

        // --- Application Logic ---
        const fileInput = document.getElementById('pdf-upload');
        const uploadBtnLabel = document.getElementById('upload-btn-label');
        const viewerContainer = document.getElementById('viewer-container');
        const flipbookEl = document.getElementById('flipbook');
        const controlPanel = document.getElementById('control-panel');
        const pageCounter = document.getElementById('page-counter');
        const jumpInput = document.getElementById('jump-page-input');

        let pageFlip = null; 
        let pdfDoc = null;
        let totalPages = 0;
        let currentPageNum = 1;
        let bookController = null;

        const pageWidth = 400; 
        const pageHeight = 600;

        fileInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (file && file.type === 'application/pdf') {
                uploadBtnLabel.innerText = "Loading Document...";
                const fileReader = new FileReader();
                fileReader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    await loadPDF(typedarray);
                };
                fileReader.readAsArrayBuffer(file);
            } else { alert("Please provide a valid PDF file."); }
        });

        async function loadPDF(pdfData) {
            flipbookEl.innerHTML = '';
            if (pageFlip) { pageFlip.destroy(); }

            try {
                const loadingTask = pdfjsLib.getDocument(pdfData);
                pdfDoc = await loadingTask.promise;
                totalPages = pdfDoc.numPages;
                jumpInput.max = totalPages;

                for (let i = 1; i <= totalPages; i++) {
                    const pageDiv = document.createElement('div');
                    pageDiv.classList.add('page');
                    pageDiv.dataset.pageNum = i; 
                    pageDiv.innerHTML = `Loading Page ${i}...`;
                    flipbookEl.appendChild(pageDiv);
                }

                viewerContainer.style.display = 'block';
                controlPanel.style.display = 'flex';
                uploadBtnLabel.style.display = 'none';

                pageFlip = new St.PageFlip(flipbookEl, {
                    width: pageWidth, height: pageHeight, size: "fixed",
                    minWidth: pageWidth, maxWidth: pageWidth * 2,
                    minHeight: pageHeight, maxHeight: pageHeight * 2,
                    maxShadowOpacity: 0.3, showCover: true, mobileScrollSupport: false
                });

                pageFlip.loadFromHTML(document.querySelectorAll('.page'));
                
                // Initialize Controller
                bookController = new FlipbookController(flipbookEl, pageWidth * 2, pageHeight);
                triggerFitToScreen();

                currentPageNum = 1;
                updatePageCounter(currentPageNum);
                
                for(let i = 1; i <= Math.min(4, totalPages); i++) { renderPage(i, pageWidth, pageHeight); }

                pageFlip.on('flip', (e) => {
                    currentPageNum = e.data + 1;
                    updatePageCounter(currentPageNum);
                    renderPage(currentPageNum - 1, pageWidth, pageHeight);
                    renderPage(currentPageNum, pageWidth, pageHeight);
                    renderPage(currentPageNum + 1, pageWidth, pageHeight);
                    renderPage(currentPageNum + 2, pageWidth, pageHeight);
                });

                initControls();

            } catch (error) {
                console.error("PDF Load error:", error);
                alert("Failed to read the PDF document.");
            }
        }

        async function renderPage(pageNum, pw, ph) {
            if (pageNum < 1 || pageNum > totalPages) return;
            const pageDiv = document.querySelector(`.page[data-page-num="${pageNum}"]`);
            if (!pageDiv || pageDiv.querySelector('canvas')) return; 

            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: 1 });
            const scale = Math.min(pw / viewport.width, ph / viewport.height);
            const scaledViewport = page.getViewport({ scale: scale });

            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = scaledViewport.width;
            canvas.height = scaledViewport.height;

            await page.render({ canvasContext: context, viewport: scaledViewport }).promise;
            pageDiv.innerHTML = ''; 
            pageDiv.appendChild(canvas);
        }

        function updatePageCounter(num) {
            pageCounter.innerHTML = `PG <span>${num}</span> / ${totalPages}`;
        }

        function triggerFitToScreen() {
            if (bookController) {
                bookController.fitToScreen(viewerContainer.clientWidth, viewerContainer.clientHeight);
            }
        }

        function initControls() {
            // Pagination
            document.getElementById('first-page').onclick = () => { if (currentPageNum !== 1) pageFlip.turnToPage(0); };
            document.getElementById('prev-page').onclick = () => { if (currentPageNum > 1) pageFlip.prev(); };
            document.getElementById('next-page').onclick = () => { if (currentPageNum < totalPages) pageFlip.next(); };
            document.getElementById('last-page').onclick = () => { if (currentPageNum !== totalPages) pageFlip.turnToPage(totalPages - 1); };

            document.getElementById('jump-go').onclick = () => {
                let target = parseInt(jumpInput.value);
                if (target > 0 && target <= totalPages) { pageFlip.turnToPage(target - 1); }
                jumpInput.value = ''; 
            };

            // Zoom Controls
            document.getElementById('zoom-in').onclick = () => bookController.zoom(1);
            document.getElementById('zoom-out').onclick = () => bookController.zoom(-1);
            document.getElementById('fit-screen').onclick = triggerFitToScreen;

            // Pan Controls
            document.getElementById('pan-left').onclick = () => bookController.pan(1, 0);
            document.getElementById('pan-right').onclick = () => bookController.pan(-1, 0);
            document.getElementById('pan-up').onclick = () => bookController.pan(0, 1);
            document.getElementById('pan-down').onclick = () => bookController.pan(0, -1);

            // Fullscreen Mode
            const btnFullscreen = document.getElementById('toggle-fullscreen');
            btnFullscreen.onclick = () => {
                if (!document.fullscreenElement) {
                    viewerContainer.requestFullscreen().catch(err => {
                        alert(`Error attempting to enable fullscreen: ${err.message}`);
                    });
                    btnFullscreen.innerText = "><"; 
                } else {
                    document.exitFullscreen();
                    btnFullscreen.innerText = "[ ]"; 
                }
            };
            
            // Re-fit matrix bounds when screen resizes or enters fullscreen
            window.addEventListener('resize', triggerFitToScreen);
        }
    </script>
</body>
</html>
