<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D PDF Flipbook with Toolbar and Upload</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; /* Prevents scrollbars during zoom */
        }

        #toolbar {
            background-color: #34495e;
            padding: 15px 25px;
            border-radius: 8px;
            margin: 20px 0;
            display: flex;
            gap: 15px;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10; 
            flex-wrap: wrap; /* Allows wrapping on smaller screens */
            justify-content: center;
        }

        button, .upload-label {
            padding: 8px 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
            font-size: 14px;
        }

        button:hover, .upload-label:hover { background-color: #2980b9; }
        
        input[type="number"] {
            width: 50px;
            padding: 5px;
            text-align: center;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        /* --- NEW: Hide standard file input and style a label instead --- */
        input[type="file"] {
            display: none;
        }

        .divider {
            width: 2px;
            height: 30px;
            background-color: #7f8c8d;
            margin: 0 10px;
        }

        #zoom-wrapper {
            transition: transform 0.3s ease; 
            transform-origin: top center;
        }

        #book-container {
            width: 800px;
            height: 500px;
            position: relative;
        }

        .my-page {
            background-color: white;
            border: 1px solid #ddd;
            overflow: hidden;
            box-shadow: inset -2px 0 5px rgba(0,0,0,0.1); 
        }

        .my-page canvas {
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <label for="pdf-upload" class="upload-label">Upload PDF</label>
        <input type="file" id="pdf-upload" accept="application/pdf">

        <div class="divider"></div>

        <button id="btn-prev">Prev Page</button>
        <span>Page: <input type="number" id="page-input" value="1" min="1"> / <span id="page-total">?</span></span>
        <button id="btn-next">Next Page</button>
        
        <div class="divider"></div>
        
        <button id="btn-zoom-out">Zoom -</button>
        <button id="btn-zoom-in">Zoom +</button>
    </div>
    
    <div id="zoom-wrapper">
        <div id="book-container"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const bookContainer = document.getElementById('book-container');
        let pageFlipInstance = null; 
        let totalPages = 0;
        let currentZoom = 1.0;
        const zoomWrapper = document.getElementById('zoom-wrapper');

        // --- NEW: Wrapped PDF loading logic into a reusable function ---
        function renderPDF(pdfSource) {
            // 1. Clean up existing book if it exists
            if (pageFlipInstance) {
                pageFlipInstance.destroy();
                pageFlipInstance = null;
            }
            
            // 2. Reset DOM and UI states
            bookContainer.innerHTML = ''; 
            currentZoom = 1.0;
            zoomWrapper.style.transform = `scale(${currentZoom})`;
            document.getElementById('page-input').value = 1;

            // 3. Load the new document
            pdfjsLib.getDocument(pdfSource).promise.then(pdfDoc => {
                totalPages = pdfDoc.numPages;
                document.getElementById('page-total').textContent = totalPages;
                
                const pageElements = [];

                // Generate HTML pages
                for (let i = 1; i <= totalPages; i++) {
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'my-page';
                    const canvas = document.createElement('canvas');
                    pageDiv.appendChild(canvas);
                    bookContainer.appendChild(pageDiv);
                    pageElements.push({ pageNum: i, canvas: canvas });
                }

                // Initialize PageFlip
                pageFlipInstance = new St.PageFlip(bookContainer, {
                    width: 400, 
                    height: 500, 
                    showCover: true, 
                    maxShadowOpacity: 0.5, 
                });

                pageFlipInstance.loadFromHTML(document.querySelectorAll('.my-page'));

                // Render PDF onto canvases
                pageElements.forEach(item => {
                    pdfDoc.getPage(item.pageNum).then(page => {
                        const viewport = page.getViewport({ scale: 1.5 });
                        item.canvas.width = viewport.width;
                        item.canvas.height = viewport.height;
                        page.render({
                            canvasContext: item.canvas.getContext('2d'),
                            viewport: viewport
                        });
                    });
                });

                // Sync UI when page turns
                pageFlipInstance.on('flip', (e) => {
                    document.getElementById('page-input').value = e.data + 1;
                });

            }).catch(err => {
                console.error("Error loading PDF: ", err);
                alert("There was an error loading the PDF. Check the console for details.");
            });
        }

        // Load the default demo PDF on startup
        const defaultUrl = 'https://raw.githubusercontent.com/mozilla/pdf.js/ba2edeae/web/compressed.tracemonkey-pldi-09.pdf';
        renderPDF(defaultUrl);

        // --- NEW: Handle File Upload ---
        document.getElementById('pdf-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            
            if (file && file.type === 'application/pdf') {
                const reader = new FileReader();
                
                // When the file is done reading, pass the data to our render function
                reader.onload = function(event) {
                    const typedarray = new Uint8Array(event.target.result);
                    renderPDF(typedarray);
                };
                
                // Read the file as an ArrayBuffer
                reader.readAsArrayBuffer(file);
            } else {
                alert('Please select a valid PDF file.');
            }
            
            // Clear the input so the same file can be uploaded again if needed
            e.target.value = ''; 
        });

        // Toolbar Button Logic (Unchanged)
        document.getElementById('btn-prev').addEventListener('click', () => {
            if (pageFlipInstance) pageFlipInstance.flipPrev();
        });

        document.getElementById('btn-next').addEventListener('click', () => {
            if (pageFlipInstance) pageFlipInstance.flipNext();
        });

        document.getElementById('page-input').addEventListener('change', (e) => {
            if (!pageFlipInstance) return;
            let targetPage = parseInt(e.target.value, 10) - 1; 
            
            if (targetPage < 0) targetPage = 0;
            if (targetPage >= totalPages) targetPage = totalPages - 1;
            
            pageFlipInstance.flip(targetPage);
            e.target.value = targetPage + 1; 
        });

        document.getElementById('btn-zoom-in').addEventListener('click', () => {
            if (currentZoom < 2.5) { 
                currentZoom += 0.2;
                zoomWrapper.style.transform = `scale(${currentZoom})`;
            }
        });

        document.getElementById('btn-zoom-out').addEventListener('click', () => {
            if (currentZoom > 0.6) { 
                currentZoom -= 0.2;
                zoomWrapper.style.transform = `scale(${currentZoom})`;
            }
        });
    </script>
</body>
</html>
