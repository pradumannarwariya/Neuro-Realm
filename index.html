<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-READER v2.0 | Praduman Narwariya</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* CSS Variables for Dynamic Zoom and Theming */
        :root {
            --zoom-level: 1;
            --book-width: 800px; /* 400px per page * 2 pages */
            --book-height: 600px;
            
            /* New Theme Colors */
            --theme-black: #0a0a0a;
            --theme-grey: #1f1f24;
            --theme-magenta: #ff66ff;
            --theme-blue: #33aaff;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background-color: var(--theme-black);
            /* Updated Grid pattern using Grey and Blue */
            background-image: 
                linear-gradient(rgba(51, 170, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(51, 170, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            
            /* Ensure the browser scrollbar is allowed to appear naturally */
            overflow: auto; 
        }

        /* --- Header & Layout --- */
        .cyber-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 15px 30px;
            border: 2px solid var(--theme-blue);
            background-color: var(--theme-grey);
            box-shadow: 0 0 15px rgba(51, 170, 255, 0.2);
            border-radius: 8px;
        }

        .cyber-header h1 {
            margin: 0;
            color: var(--theme-magenta);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 102, 255, 0.5);
        }

        .cyber-header p { 
            margin: 10px 0 0; 
            color: #aaaaaa; 
            font-size: 14px; 
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* --- Input & Control Styling --- */
        .upload-section {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        input[type="file"] { display: none; }

        .cyber-btn {
            padding: 10px 18px;
            font-size: 15px;
            cursor: pointer;
            border: 1px solid var(--theme-blue);
            border-radius: 5px;
            background-color: var(--theme-grey);
            color: var(--theme-blue);
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            transition: all 0.3s ease;
            outline: none;
        }

        .cyber-btn:hover {
            border-color: var(--theme-magenta);
            color: var(--theme-magenta);
            box-shadow: 0 0 10px rgba(255, 102, 255, 0.4);
            background-color: #2a2a35;
        }

        .cyber-btn:active { transform: scale(0.95); }

        /* --- Control Panel Styling --- */
        #control-panel {
            display: none; 
            background-color: var(--theme-grey);
            border: 1px solid var(--theme-blue);
            border-radius: 8px;
            padding: 15px 20px;
            margin-top: 25px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 950px; /* Widened to fit new controls */
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap; /* Allows wrapping on smaller screens */
            gap: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        .control-group { display: flex; gap: 8px; align-items: center; }

        .page-display { 
            font-weight: bold; 
            color: #ffffff; 
            font-size: 14px; 
            min-width: 110px; 
            text-align: center;
        }

        .page-display span { color: var(--theme-magenta); }

        .jump-input {
            width: 50px;
            background-color: var(--theme-black);
            border: 1px solid var(--theme-blue);
            color: var(--theme-magenta);
            padding: 8px;
            border-radius: 4px;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
        }
        
        .jump-input:focus { 
            outline: none; 
            border-color: var(--theme-magenta); 
        }

        /* --- Flipbook Container & Zoom Wrapper --- */
        .flipbook-container {
            display: none; 
            position: relative;
            z-index: 10; 
            max-width: 100%;
            overflow: hidden; /* Contains the wrapper gracefully */
            padding: 10px;
        }

        /* This wrapper physically changes size to force the browser scrollbars to appear */
        .zoom-wrapper {
            width: calc(var(--book-width) * var(--zoom-level));
            height: calc(var(--book-height) * var(--zoom-level));
            transition: width 0.3s ease, height 0.3s ease;
            margin: 0 auto; /* Keeps the book centered */
        }

        #flipbook {
            border: 2px solid var(--theme-grey);
            border-radius: 5px;
            background-color: #fff;
            
            /* Applying the visual zoom */
            transform: scale(var(--zoom-level));
            transform-origin: top left;
            transition: transform 0.3s ease;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.8);
        }

        .page {
            background-color: #f9f9f9; 
            color: #555;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-size: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .page canvas { display: block; max-width: 100%; max-height: 100%; }

        /* Fullscreen styles */
        :-webkit-full-screen #flipbook { border: none; }
        :fullscreen #flipbook { border: none; }
        :fullscreen .flipbook-container { padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh;}

        /* --- Footer --- */
        .cyber-footer {
            margin-top: auto;
            padding: 20px 0;
            text-align: center;
            width: 100%;
            border-top: 1px solid var(--theme-grey);
            color: #888;
            font-size: 13px;
            letter-spacing: 1px;
        }
        
        .creator-name { 
            font-weight: bold; 
            color: var(--theme-blue); 
        }
    </style>
</head>
<body>

    <header class="cyber-header">
        <h1>// Cyber-Reader</h1>
        <p>Interactive Large Document Interface</p>
    </header>

    <main class="main-content">
        <section class="upload-section">
            <label for="pdf-upload" class="cyber-btn" id="upload-btn-label">
                Open PDF File
            </label>
            <input type="file" id="pdf-upload" accept="application/pdf">
        </section>

        <!-- Container for the book -->
        <div class="flipbook-container" id="viewer-container">
            <div class="zoom-wrapper" id="zoom-wrapper">
                <div id="flipbook"></div>
            </div>
        </div>

        <!-- The Control Panel -->
        <div id="control-panel">
            <div class="control-group">
                <button id="first-page" class="cyber-btn" title="First Page">|&lt;</button>
                <button id="prev-page" class="cyber-btn" title="Previous Page">&lt;</button>
                <div class="page-display" id="page-counter">PG <span>--</span> / --</div>
                <button id="next-page" class="cyber-btn" title="Next Page">&gt;</button>
                <button id="last-page" class="cyber-btn" title="Last Page">&gt;|</button>
            </div>
            
            <div class="control-group">
                <input type="number" id="jump-page-input" class="jump-input" placeholder="#" min="1">
                <button id="jump-go" class="cyber-btn" title="Jump to Page">Go</button>
            </div>

            <div class="control-group">
                <button id="zoom-out" class="cyber-btn" title="Zoom Out">-</button>
                <button id="zoom-in" class="cyber-btn" title="Zoom In">+</button>
                <button id="fit-screen" class="cyber-btn" title="Fit to Screen">Fit</button>
                <button id="toggle-fullscreen" class="cyber-btn" title="Toggle Full Screen">[ ]</button>
            </div>
        </div>
    </main>

    <footer class="cyber-footer">
        Engineered by <span class="creator-name">Praduman Narwariya</span>
    </footer>

    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // DOM Elements
        const fileInput = document.getElementById('pdf-upload');
        const uploadBtnLabel = document.getElementById('upload-btn-label');
        const viewerContainer = document.getElementById('viewer-container');
        const flipbookEl = document.getElementById('flipbook');
        const controlPanel = document.getElementById('control-panel');
        const pageCounter = document.getElementById('page-counter');
        const jumpInput = document.getElementById('jump-page-input');

        // Buttons
        const btnFirst = document.getElementById('first-page');
        const btnPrev = document.getElementById('prev-page');
        const btnNext = document.getElementById('next-page');
        const btnLast = document.getElementById('last-page');
        const btnJump = document.getElementById('jump-go');
        const btnFullscreen = document.getElementById('toggle-fullscreen');
        const btnZoomIn = document.getElementById('zoom-in');
        const btnZoomOut = document.getElementById('zoom-out');
        const btnFit = document.getElementById('fit-screen');

        let pageFlip = null; 
        let pdfDoc = null;
        let totalPages = 0;
        let currentPageNum = 1;
        let currentZoom = 1;

        // Base dimensions of the book
        const pageWidth = 400; 
        const pageHeight = 600;

        fileInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (file && file.type === 'application/pdf') {
                uploadBtnLabel.innerText = "Loading Document...";
                const fileReader = new FileReader();
                fileReader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    await loadPDF(typedarray);
                };
                fileReader.readAsArrayBuffer(file);
            } else { alert("Please provide a valid PDF file."); }
        });

        async function loadPDF(pdfData) {
            flipbookEl.innerHTML = '';
            if (pageFlip) { pageFlip.destroy(); }

            try {
                const loadingTask = pdfjsLib.getDocument(pdfData);
                pdfDoc = await loadingTask.promise;
                totalPages = pdfDoc.numPages;
                jumpInput.max = totalPages;

                for (let i = 1; i <= totalPages; i++) {
                    const pageDiv = document.createElement('div');
                    pageDiv.classList.add('page');
                    pageDiv.dataset.pageNum = i; 
                    pageDiv.innerHTML = `Loading Page ${i}`;
                    flipbookEl.appendChild(pageDiv);
                }

                viewerContainer.style.display = 'block';
                controlPanel.style.display = 'flex';
                uploadBtnLabel.style.display = 'none';

                pageFlip = new St.PageFlip(flipbookEl, {
                    width: pageWidth, height: pageHeight, size: "fixed",
                    minWidth: pageWidth, maxWidth: pageWidth * 2,
                    minHeight: pageHeight, maxHeight: pageHeight * 2,
                    maxShadowOpacity: 0.3, showCover: true, mobileScrollSupport: false
                });

                pageFlip.loadFromHTML(document.querySelectorAll('.page'));
                currentPageNum = 1;
                updatePageCounter(currentPageNum);
                
                // Automatically fit to screen upon first load
                fitBookToScreen();

                for(let i = 1; i <= Math.min(4, totalPages); i++) { renderPage(i, pageWidth, pageHeight); }

                pageFlip.on('flip', (e) => {
                    currentPageNum = e.data + 1;
                    updatePageCounter(currentPageNum);
                    
                    renderPage(currentPageNum - 1, pageWidth, pageHeight);
                    renderPage(currentPageNum, pageWidth, pageHeight);
                    renderPage(currentPageNum + 1, pageWidth, pageHeight);
                    renderPage(currentPageNum + 2, pageWidth, pageHeight);
                });

                initControls();

            } catch (error) {
                console.error("PDF Load error:", error);
                alert("Failed to read the PDF document.");
            }
        }

        async function renderPage(pageNum, pw, ph) {
            if (pageNum < 1 || pageNum > totalPages) return;
            const pageDiv = document.querySelector(`.page[data-page-num="${pageNum}"]`);
            if (!pageDiv || pageDiv.querySelector('canvas')) return; 

            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: 1 });
            const scale = Math.min(pw / viewport.width, ph / viewport.height);
            const scaledViewport = page.getViewport({ scale: scale });

            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = scaledViewport.width;
            canvas.height = scaledViewport.height;

            await page.render({ canvasContext: context, viewport: scaledViewport }).promise;

            pageDiv.innerHTML = ''; 
            pageDiv.appendChild(canvas);
        }

        function updatePageCounter(num) {
            pageCounter.innerHTML = `PG <span>${num}</span> / ${totalPages}`;
        }

        function setZoom(level) {
            // Keep zoom within a reasonable range (0.3x to 3x)
            currentZoom = Math.max(0.3, Math.min(level, 3));
            document.documentElement.style.setProperty('--zoom-level', currentZoom);
        }

        function fitBookToScreen() {
            // Calculate available screen space, accounting for padding and control panels
            const availableWidth = window.innerWidth - 60; 
            const availableHeight = window.innerHeight - 250; 
            
            // The book is 2 pages wide (800px) and 1 page tall (600px)
            const scaleX = availableWidth / (pageWidth * 2);
            const scaleY = availableHeight / pageHeight;
            
            // Pick the smaller scale to ensure the whole book fits
            setZoom(Math.min(scaleX, scaleY));
        }

        function initControls() {
            // Pagination
            btnFirst.onclick = () => { if (currentPageNum !== 1) pageFlip.turnToPage(0); };
            btnPrev.onclick = () => { if (currentPageNum > 1) pageFlip.prev(); };
            btnNext.onclick = () => { if (currentPageNum < totalPages) pageFlip.next(); };
            btnLast.onclick = () => { if (currentPageNum !== totalPages) pageFlip.turnToPage(totalPages - 1); };

            btnJump.onclick = () => {
                let target = parseInt(jumpInput.value);
                if (target > 0 && target <= totalPages) { pageFlip.turnToPage(target - 1); }
                jumpInput.value = ''; 
            };

            // Zoom Controls
            btnZoomIn.onclick = () => setZoom(currentZoom + 0.15);
            btnZoomOut.onclick = () => setZoom(currentZoom - 0.15);
            btnFit.onclick = () => fitBookToScreen();

            // Fullscreen Mode
            btnFullscreen.onclick = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen();
                    btnFullscreen.innerText = "><"; 
                } else {
                    document.exitFullscreen();
                    btnFullscreen.innerText = "[ ]"; 
                }
            };
            
            // Recalculate zoom if user resizes the window while reading
            window.addEventListener('resize', () => {
                // Optional: Automatically fit to screen on resize
                // fitBookToScreen(); 
            });
        }
    </script>
</body>
</html>
