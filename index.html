<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Flipbook Reader</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        #upload-btn {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }

        /* Container for the flipbook */
        .flipbook-container {
            display: none; /* Hidden until a PDF is loaded */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* Styling for individual pages */
        .page {
            background-color: white;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #ddd;
        }

        .page canvas {
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Interactive PDF Flipbook</h1>
        <p>Upload a PDF to start reading!</p>
        <input type="file" id="pdf-upload" accept="application/pdf">
    </div>

    <div class="flipbook-container">
        <div id="flipbook"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>

    <script>
        // Set up the PDF.js worker (required for PDF.js to function)
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // Get DOM elements
        const fileInput = document.getElementById('pdf-upload');
        const flipbookContainer = document.querySelector('.flipbook-container');
        const flipbookEl = document.getElementById('flipbook');

        let pageFlip = null; // Variable to store our flipbook instance

        // Listen for when a user selects a file
        fileInput.addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (file && file.type === 'application/pdf') {
                const fileReader = new FileReader();

                // When the file is read, process it
                fileReader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    await loadPDF(typedarray);
                };

                // Read the file as an ArrayBuffer
                fileReader.readAsArrayBuffer(file);
            } else {
                alert("Please select a valid PDF file.");
            }
        });

        // Function to load and render the PDF
        async function loadPDF(pdfData) {
            // Reset the flipbook container if a previous PDF was loaded
            flipbookEl.innerHTML = '';
            if (pageFlip) {
                pageFlip.destroy();
            }

            // Load the PDF document
            const loadingTask = pdfjsLib.getDocument(pdfData);
            const pdf = await loadingTask.promise;
            
            // Define standard dimensions for our flipbook pages
            const pageWidth = 400;
            const pageHeight = 600;

            // Loop through all the pages in the PDF
            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                const page = await pdf.getPage(pageNum);
                
                // Calculate scale to fit our defined dimensions
                const viewport = page.getViewport({ scale: 1 });
                const scale = Math.min(pageWidth / viewport.width, pageHeight / viewport.height);
                const scaledViewport = page.getViewport({ scale: scale });

                // Create a canvas element for this page
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.width = scaledViewport.width;
                canvas.height = scaledViewport.height;

                // Render the PDF page into the canvas
                const renderContext = {
                    canvasContext: context,
                    viewport: scaledViewport
                };
                await page.render(renderContext).promise;

                // Create a div wrapper for the page and append the canvas
                const pageDiv = document.createElement('div');
                pageDiv.classList.add('page');
                pageDiv.appendChild(canvas);
                flipbookEl.appendChild(pageDiv);
            }

            // Show the flipbook container
            flipbookContainer.style.display = 'block';

            // Initialize the StPageFlip library
            pageFlip = new St.PageFlip(flipbookEl, {
                width: pageWidth,
                height: pageHeight,
                size: "fixed", // Ensure pages stay the defined size
                minWidth: 300,
                maxWidth: 600,
                minHeight: 400,
                maxHeight: 800,
                maxShadowOpacity: 0.5, // Adds a realistic shadow in the center fold
                showCover: true,       // Treats the first and last pages as covers
                mobileScrollSupport: false // Prevents weird scrolling issues on phones
            });

            // Load the HTML elements into the flipbook
            pageFlip.loadFromHTML(document.querySelectorAll('.page'));
        }
    </script>
</body>
</html>
