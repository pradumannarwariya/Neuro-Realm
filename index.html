<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D PDF Flipbook with Toolbar, Upload, Panning, and Lock</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; 
            cursor: default; 
        }

        #toolbar {
            background-color: #34495e;
            padding: 15px 25px;
            border-radius: 8px;
            margin: 20px 0;
            display: flex;
            gap: 15px;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            z-index: 10; 
            flex-wrap: wrap; 
            justify-content: center;
        }

        button, .upload-label {
            padding: 8px 16px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
            font-size: 14px;
        }

        button:hover, .upload-label:hover { background-color: #2980b9; }
        
        #btn-reset { background-color: #e67e22; }
        #btn-reset:hover { background-color: #d35400; }

        /* --- NEW: Button styles for Full Screen and Lock --- */
        #btn-fullscreen { background-color: #8e44ad; }
        #btn-fullscreen:hover { background-color: #9b59b6; }
        
        #btn-lock { background-color: #27ae60; }
        #btn-lock:hover { background-color: #2ecc71; }

        input[type="number"] {
            width: 50px;
            padding: 5px;
            text-align: center;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        input[type="file"] {
            display: none;
        }

        .divider {
            width: 2px;
            height: 30px;
            background-color: #7f8c8d;
            margin: 0 10px;
        }

        #zoom-wrapper {
            transition: transform 0.3s ease; 
            transform-origin: top center;
            will-change: transform; 
        }

        #book-container {
            width: 800px;
            height: 500px;
            position: relative;
        }

        .my-page {
            background-color: white;
            border: 1px solid #ddd;
            overflow: hidden;
            box-shadow: inset -2px 0 5px rgba(0,0,0,0.1); 
        }

        .my-page canvas {
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <label for="pdf-upload" class="upload-label">Upload</label>
        <input type="file" id="pdf-upload" accept="application/pdf">

        <div class="divider"></div>

        <button id="btn-prev">Prev</button>
        <span>Page: <input type="number" id="page-input" value="1" min="1"> / <span id="page-total">?</span></span>
        <button id="btn-next">Next</button>
        
        <div class="divider"></div>
        
        <button id="btn-zoom-out">Zoom -</button>
        <button id="btn-zoom-in">Zoom +</button>
        <button id="btn-reset">Reset</button>

        <div class="divider"></div>
        <button id="btn-fullscreen">Full Screen</button>
        <button id="btn-lock">Lock Screen</button>
    </div>
    
    <div id="zoom-wrapper">
        <div id="book-container"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>
    
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        const bookContainer = document.getElementById('book-container');
        const zoomWrapper = document.getElementById('zoom-wrapper');
        let pageFlipInstance = null; 
        let totalPages = 0;
        
        let currentZoom = 1.0;
        let isDragging = false;
        let startX = 0, startY = 0;
        let translateX = 0, translateY = 0;

        // --- NEW: Lock State Variable ---
        let isLocked = false; 

        function updateTransform() {
            zoomWrapper.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentZoom})`;
        }

        function resetView() {
            currentZoom = 1.0;
            translateX = 0;
            translateY = 0;
            zoomWrapper.style.transition = 'transform 0.3s ease'; 
            updateTransform();
        }

        function renderPDF(pdfSource) {
            if (pageFlipInstance) {
                pageFlipInstance.destroy();
                pageFlipInstance = null;
            }
            
            bookContainer.innerHTML = ''; 
            resetView(); 
            document.getElementById('page-input').value = 1;

            pdfjsLib.getDocument(pdfSource).promise.then(pdfDoc => {
                totalPages = pdfDoc.numPages;
                document.getElementById('page-total').textContent = totalPages;
                
                const pageElements = [];

                for (let i = 1; i <= totalPages; i++) {
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'my-page';
                    const canvas = document.createElement('canvas');
                    pageDiv.appendChild(canvas);
                    bookContainer.appendChild(pageDiv);
                    pageElements.push({ pageNum: i, canvas: canvas });
                }

                pageFlipInstance = new St.PageFlip(bookContainer, {
                    width: 400, 
                    height: 500, 
                    showCover: true, 
                    maxShadowOpacity: 0.5, 
                });

                pageFlipInstance.loadFromHTML(document.querySelectorAll('.my-page'));

                pageElements.forEach(item => {
                    pdfDoc.getPage(item.pageNum).then(page => {
                        const viewport = page.getViewport({ scale: 1.5 });
                        item.canvas.width = viewport.width;
                        item.canvas.height = viewport.height;
                        page.render({
                            canvasContext: item.canvas.getContext('2d'),
                            viewport: viewport
                        });
                    });
                });

                pageFlipInstance.on('flip', (e) => {
                    document.getElementById('page-input').value = e.data + 1;
                });

            }).catch(err => {
                console.error("Error loading PDF: ", err);
                alert("There was an error loading the PDF.");
            });
        }

        const defaultUrl = 'https://raw.githubusercontent.com/mozilla/pdf.js/ba2edeae/web/compressed.tracemonkey-pldi-09.pdf';
        renderPDF(defaultUrl);

        document.getElementById('pdf-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file && file.type === 'application/pdf') {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const typedarray = new Uint8Array(event.target.result);
                    renderPDF(typedarray);
                };
                reader.readAsArrayBuffer(file);
            }
            e.target.value = ''; 
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            if (pageFlipInstance) pageFlipInstance.flipPrev();
        });

        document.getElementById('btn-next').addEventListener('click', () => {
            if (pageFlipInstance) pageFlipInstance.flipNext();
        });

        document.getElementById('page-input').addEventListener('change', (e) => {
            if (!pageFlipInstance) return;
            let targetPage = parseInt(e.target.value, 10) - 1; 
            
            if (targetPage < 0) targetPage = 0;
            if (targetPage >= totalPages) targetPage = totalPages - 1;
            
            pageFlipInstance.flip(targetPage);
            e.target.value = targetPage + 1; 
        });

        document.getElementById('btn-zoom-in').addEventListener('click', () => {
            if (isLocked) return; // Prevent zooming if locked
            if (currentZoom < 2.5) { 
                currentZoom += 0.2;
                updateTransform();
            }
        });

        document.getElementById('btn-zoom-out').addEventListener('click', () => {
            if (isLocked) return; // Prevent zooming if locked
            if (currentZoom > 0.6) { 
                currentZoom -= 0.2;
                updateTransform();
            }
        });

        document.getElementById('btn-reset').addEventListener('click', () => {
            if (isLocked) return; // Prevent reset if locked
            resetView();
        });

        // --- NEW: Full Screen Logic ---
        const btnFullscreen = document.getElementById('btn-fullscreen');
        
        btnFullscreen.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                // Request fullscreen on the entire document
                document.documentElement.requestFullscreen().catch(err => {
                    console.error(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                // Exit fullscreen
                document.exitFullscreen();
            }
        });

        // Listen for fullscreen changes (e.g., user pressing ESC key) to update button text
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                btnFullscreen.textContent = 'Exit Full Screen';
            } else {
                btnFullscreen.textContent = 'Full Screen';
            }
        });

        // --- NEW: Lock Screen Logic ---
        const btnLock = document.getElementById('btn-lock');
        
        btnLock.addEventListener('click', () => {
            isLocked = !isLocked;
            
            if (isLocked) {
                btnLock.textContent = 'Unlock Screen';
                btnLock.style.backgroundColor = '#c0392b'; // Change to Red
                // Disable physical dragging of the flipbook pages
                bookContainer.style.pointerEvents = 'none'; 
            } else {
                btnLock.textContent = 'Lock Screen';
                btnLock.style.backgroundColor = ''; // Revert to CSS default (Green)
                // Re-enable physical dragging of the flipbook pages
                bookContainer.style.pointerEvents = 'auto'; 
            }
        });

        // Drag to Pan Logic
        window.addEventListener('mousedown', (e) => {
            if (isLocked) return; // --- NEW: Prevent panning if locked
            
            if (e.target.closest('#toolbar')) return;

            if (currentZoom === 1.0 && e.target.tagName.toLowerCase() === 'canvas') {
                return;
            }

            isDragging = true;
            zoomWrapper.style.transition = 'none';
            startX = e.clientX - translateX;
            startY = e.clientY - translateY;
            document.body.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            updateTransform();
        });

        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                zoomWrapper.style.transition = 'transform 0.3s ease';
                document.body.style.cursor = 'default';
            }
        });

    </script>
</body>
</html>
