<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-READER v2.0 | Praduman Narwariya</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>
        /* CSS Variables */
        :root {
            --book-width: 800px;
            --book-height: 600px;
            --theme-black: #0a0a0a;
            --theme-grey: #1f1f24;
            --theme-magenta: #ff66ff;
            --theme-blue: #33aaff;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background-color: var(--theme-black);
            background-image: 
                linear-gradient(rgba(51, 170, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(51, 170, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow: hidden; 
        }

        /* --- Header & Layout --- */
        .cyber-header {
            text-align: center;
            margin-bottom: 20px;
            padding: 15px 30px;
            border: 2px solid var(--theme-blue);
            background-color: var(--theme-grey);
            box-shadow: 0 0 15px rgba(51, 170, 255, 0.2);
            border-radius: 8px;
            width: 100%;
            max-width: 950px;
            box-sizing: border-box;
        }

        .cyber-header h1 {
            margin: 0; color: var(--theme-magenta); text-transform: uppercase;
            letter-spacing: 2px; text-shadow: 0 0 10px rgba(255, 102, 255, 0.5);
        }
        .cyber-header p { margin: 10px 0 0; color: #aaaaaa; font-size: 14px; }

        .main-content {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            width: 100%; max-width: 950px;
        }

        /* --- Controls --- */
        .upload-section { margin-bottom: 20px; display: flex; justify-content: center; width: 100%; }
        input[type="file"] { display: none; }

        .cyber-btn {
            padding: 8px 14px; font-size: 14px; cursor: pointer;
            border: 1px solid var(--theme-blue); border-radius: 5px;
            background-color: var(--theme-grey); color: var(--theme-blue);
            font-family: 'Orbitron', sans-serif; text-transform: uppercase;
            transition: all 0.3s ease; outline: none; display: flex; align-items: center; gap: 8px;
        }
        .cyber-btn:hover {
            border-color: var(--theme-magenta); color: var(--theme-magenta);
            box-shadow: 0 0 10px rgba(255, 102, 255, 0.4); background-color: #2a2a35;
        }
        .cyber-btn:active { transform: scale(0.95); }

        #control-panel {
            display: none; background-color: var(--theme-grey);
            border: 1px solid var(--theme-blue); border-radius: 8px;
            padding: 15px 20px; margin-top: 20px; margin-bottom: 20px;
            width: 100%; display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap; gap: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5); box-sizing: border-box;
        }
        .control-group { display: flex; gap: 8px; align-items: center; }

        .page-display { font-weight: bold; color: #ffffff; font-size: 14px; min-width: 110px; text-align: center; }
        .page-display span { color: var(--theme-magenta); }

        .jump-input {
            width: 50px; background-color: var(--theme-black); border: 1px solid var(--theme-blue);
            color: var(--theme-magenta); padding: 6px; border-radius: 4px; text-align: center;
            font-family: 'Orbitron', sans-serif;
        }

        /* --- Viewport & Interactive Elements --- */
        .flipbook-container {
            display: none; position: relative; width: 100%; height: 60vh; min-height: 400px;
            border: 1px solid var(--theme-blue); background-color: var(--theme-black);
            overflow: hidden; border-radius: 8px; box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        #flipbook {
            border: 2px solid var(--theme-grey); background-color: #fff;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.8); transform-origin: top left;
        }

        .page {
            background-color: #f9f9f9; color: #555; border: 1px solid #ddd;
            box-sizing: border-box; font-size: 14px; display: flex;
            justify-content: center; align-items: center; text-align: center;
        }
        .page canvas { display: block; max-width: 100%; max-height: 100%; }

        /* --- Interaction Overlay (For Drag/Pinch) --- */
        #interaction-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 50; cursor: grab; touch-action: none;
            display: none; /* Hidden when Locked */
        }
        #interaction-overlay:active { cursor: grabbing; }

        /* State Classes */
        .unlocked-mode #interaction-overlay { display: block; }
        .locked-mode #interaction-overlay { display: none; }

        /* Floating Lock Button */
        .floating-lock-btn {
            position: absolute; top: 15px; right: 15px; z-index: 100;
            background-color: rgba(31, 31, 36, 0.85); backdrop-filter: blur(5px);
        }

        /* Fullscreen modifications */
        :-webkit-full-screen .flipbook-container { height: 100vh; width: 100vw; border: none; border-radius: 0; margin: 0; padding: 0; }
        :fullscreen .flipbook-container { height: 100vh; width: 100vw; border: none; border-radius: 0; margin: 0; padding: 0; }
        
        .cyber-footer { margin-top: auto; padding: 10px 0; text-align: center; width: 100%; border-top: 1px solid var(--theme-grey); color: #888; font-size: 13px; letter-spacing: 1px; }
        .creator-name { font-weight: bold; color: var(--theme-blue); }
        
        @media (max-width: 600px) { .hide-mobile { display: none; } }
    </style>
</head>
<body>

    <header class="cyber-header" id="ui-header">
        <h1>// Cyber-Reader</h1>
        <p>Interactive Large Document Interface</p>
    </header>

    <main class="main-content" id="ui-main">
        <section class="upload-section" id="ui-upload">
            <label for="pdf-upload" class="cyber-btn" id="upload-btn-label">Open PDF File</label>
            <input type="file" id="pdf-upload" accept="application/pdf">
        </section>

        <div class="flipbook-container locked-mode" id="viewer-container">
            <div id="flipbook"></div>
            
            <div id="interaction-overlay"></div>
            
            <button id="lock-toggle-btn" class="cyber-btn floating-lock-btn" title="Toggle Pan/Zoom">
                <span id="lock-icon">🔒</span> <span class="hide-mobile" id="lock-text">Locked (Turn Pages)</span>
            </button>
        </div>

        <div id="control-panel">
            <div class="control-group">
                <button id="prev-page" class="cyber-btn" title="Previous Page">&lt;</button>
                <div class="page-display" id="page-counter">PG <span>--</span> / --</div>
                <button id="next-page" class="cyber-btn" title="Next Page">&gt;</button>
            </div>
            
            <div class="control-group">
                <input type="number" id="jump-page-input" class="jump-input" placeholder="#" min="1">
                <button id="jump-go" class="cyber-btn" title="Jump to Page">Go</button>
            </div>

            <div class="control-group">
                <button id="zoom-out" class="cyber-btn" title="Zoom Out">-</button>
                <button id="zoom-in" class="cyber-btn" title="Zoom In">+</button>
                <button id="fit-screen" class="cyber-btn" title="Fit to Screen">Fit</button>
                <button id="toggle-fullscreen" class="cyber-btn" title="Toggle Full Screen">[ Full Screen ]</button>
            </div>
        </div>
    </main>

    <footer class="cyber-footer" id="ui-footer">
        Engineered by <span class="creator-name">Praduman Narwariya</span>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.js"></script>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

        // --- Controller Class with Continuous Drag & Pinch ---
        class FlipbookController {
            constructor(element, bookWidth, bookHeight, maxScale = 4.0) {
                this.element = element;
                this.bookWidth = bookWidth;
                this.bookHeight = bookHeight;
                this.screenWidth = 0;
                this.screenHeight = 0;
                this.scale = 1;
                this.posX = 0;
                this.posY = 0;
                this.minScale = 0.1; 
                this.maxScale = maxScale;
            }

            fitToScreen(viewportWidth, viewportHeight) {
                this.screenWidth = viewportWidth;
                this.screenHeight = viewportHeight;
                const scaleX = this.screenWidth / this.bookWidth;
                const scaleY = this.screenHeight / this.bookHeight;
                
                this.scale = Math.min(scaleX, scaleY);
                this.minScale = this.scale; // Prevent shrinking smaller than viewport

                this.posX = (this.screenWidth - (this.bookWidth * this.scale)) / 2;
                this.posY = (this.screenHeight - (this.bookHeight * this.scale)) / 2;
                this.applyTransform();
            }

            // Continuous Pan for Dragging
            panExact(deltaX, deltaY) {
                this.posX += deltaX;
                this.posY += deltaY;
                this.enforceBoundaries();
                this.applyTransform();
            }

            // Anchored Zoom for Pinching / Buttons
            zoomExact(targetScale, anchorX, anchorY) {
                const oldScale = this.scale;
                this.scale = Math.max(this.minScale, Math.min(targetScale, this.maxScale));
                const scaleRatio = this.scale / oldScale;

                // Adjust position relative to the anchor point
                const rect = this.element.parentElement.getBoundingClientRect();
                const relX = anchorX - rect.left;
                const relY = anchorY - rect.top;

                this.posX = relX - ((relX - this.posX) * scaleRatio);
                this.posY = relY - ((relY - this.posY) * scaleRatio);

                this.enforceBoundaries();
                this.applyTransform();
            }

            enforceBoundaries() {
                const currentBookWidth = this.bookWidth * this.scale;
                const currentBookHeight = this.bookHeight * this.scale;

                if (currentBookWidth <= this.screenWidth) {
                    this.posX = (this.screenWidth - currentBookWidth) / 2;
                } else {
                    this.posX = Math.min(0, Math.max(this.posX, this.screenWidth - currentBookWidth));
                }

                if (currentBookHeight <= this.screenHeight) {
                    this.posY = (this.screenHeight - currentBookHeight) / 2;
                } else {
                    this.posY = Math.min(0, Math.max(this.posY, this.screenHeight - currentBookHeight));
                }
            }

            applyTransform() {
                this.element.style.transform = `translate(${this.posX}px, ${this.posY}px) scale(${this.scale})`;
            }
        }

        // --- Globals & Setup ---
        const viewerContainer = document.getElementById('viewer-container');
        const flipbookEl = document.getElementById('flipbook');
        const interactionOverlay = document.getElementById('interaction-overlay');
        const lockToggleBtn = document.getElementById('lock-toggle-btn');
        const lockIcon = document.getElementById('lock-icon');
        const lockText = document.getElementById('lock-text');

        let pageFlip = null; 
        let pdfDoc = null;
        let totalPages = 0;
        let currentPageNum = 1;
        let bookController = null;

        const pageWidth = 400; 
        const pageHeight = 600;
        let isLocked = true; // True = Turning pages, False = Panning/Zooming

        // --- File Upload & PDF Setup ---
        document.getElementById('pdf-upload').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (file && file.type === 'application/pdf') {
                document.getElementById('upload-btn-label').innerText = "Loading Document...";
                const fileReader = new FileReader();
                fileReader.onload = async function() { await loadPDF(new Uint8Array(this.result)); };
                fileReader.readAsArrayBuffer(file);
            }
        });

        async function loadPDF(pdfData) {
            flipbookEl.innerHTML = '';
            if (pageFlip) pageFlip.destroy();

            try {
                const loadingTask = pdfjsLib.getDocument(pdfData);
                pdfDoc = await loadingTask.promise;
                totalPages = pdfDoc.numPages;
                document.getElementById('jump-page-input').max = totalPages;

                for (let i = 1; i <= totalPages; i++) {
                    const pageDiv = document.createElement('div');
                    pageDiv.classList.add('page');
                    pageDiv.dataset.pageNum = i; 
                    pageDiv.innerHTML = `Loading Page ${i}...`;
                    flipbookEl.appendChild(pageDiv);
                }

                viewerContainer.style.display = 'block';
                document.getElementById('control-panel').style.display = 'flex';
                document.getElementById('ui-upload').style.display = 'none';

                pageFlip = new St.PageFlip(flipbookEl, {
                    width: pageWidth, height: pageHeight, size: "fixed",
                    minWidth: pageWidth, maxWidth: pageWidth * 2,
                    minHeight: pageHeight, maxHeight: pageHeight * 2,
                    maxShadowOpacity: 0.3, showCover: true, mobileScrollSupport: false
                });

                pageFlip.loadFromHTML(document.querySelectorAll('.page'));
                bookController = new FlipbookController(flipbookEl, pageWidth * 2, pageHeight);
                triggerFitToScreen();

                for(let i = 1; i <= Math.min(4, totalPages); i++) renderPage(i, pageWidth, pageHeight);

                pageFlip.on('flip', (e) => {
                    currentPageNum = e.data + 1;
                    document.getElementById('page-counter').innerHTML = `PG <span>${currentPageNum}</span> / ${totalPages}`;
                    renderPage(currentPageNum - 1, pageWidth, pageHeight);
                    renderPage(currentPageNum, pageWidth, pageHeight);
                    renderPage(currentPageNum + 1, pageWidth, pageHeight);
                    renderPage(currentPageNum + 2, pageWidth, pageHeight);
                });

                initControls();
                initGestures();
            } catch (error) { console.error("PDF Load error:", error); }
        }

        async function renderPage(pageNum, pw, ph) {
            if (pageNum < 1 || pageNum > totalPages) return;
            const pageDiv = document.querySelector(`.page[data-page-num="${pageNum}"]`);
            if (!pageDiv || pageDiv.querySelector('canvas')) return; 

            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: 1 });
            const scale = Math.min(pw / viewport.width, ph / viewport.height);
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            const scaledViewport = page.getViewport({ scale });
            canvas.width = scaledViewport.width; canvas.height = scaledViewport.height;

            await page.render({ canvasContext: context, viewport: scaledViewport }).promise;
            pageDiv.innerHTML = ''; pageDiv.appendChild(canvas);
        }

        function triggerFitToScreen() {
            if (bookController) {
                // Read exact dimensions of container
                const rect = viewerContainer.getBoundingClientRect();
                bookController.fitToScreen(rect.width, rect.height);
            }
        }

        // --- Gesture Logic (Drag / Pinch) ---
        function initGestures() {
            let isDragging = false;
            let lastX = 0, lastY = 0;
            let initialPinchDist = null;
            let initialScale = 1;

            // Lock Toggle Button
            lockToggleBtn.addEventListener('click', () => {
                isLocked = !isLocked;
                if (isLocked) {
                    viewerContainer.classList.replace('unlocked-mode', 'locked-mode');
                    lockIcon.innerText = "🔒";
                    lockText.innerText = "Locked (Turn Pages)";
                } else {
                    viewerContainer.classList.replace('locked-mode', 'unlocked-mode');
                    lockIcon.innerText = "🔓";
                    lockText.innerText = "Unlocked (Pan/Zoom)";
                }
            });

            // Pointer Events for Mouse & Touch Dragging
            interactionOverlay.addEventListener('pointerdown', (e) => {
                if (e.pointerType === 'touch' && e.touches && e.touches.length > 1) return; // Handled by touch events
                isDragging = true;
                lastX = e.clientX;
                lastY = e.clientY;
                interactionOverlay.setPointerCapture(e.pointerId);
            });

            interactionOverlay.addEventListener('pointermove', (e) => {
                if (!isDragging) return;
                e.preventDefault(); // Prevent accidental selection
                const deltaX = e.clientX - lastX;
                const deltaY = e.clientY - lastY;
                lastX = e.clientX;
                lastY = e.clientY;
                bookController.panExact(deltaX, deltaY);
            });

            interactionOverlay.addEventListener('pointerup', (e) => {
                isDragging = false;
                interactionOverlay.releasePointerCapture(e.pointerId);
            });

            // Touch Events strictly for Pinch-to-Zoom
            interactionOverlay.addEventListener('touchstart', (e) => {
                if (e.touches.length === 2) {
                    isDragging = false; // Disable dragging during pinch
                    initialPinchDist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    initialScale = bookController.scale;
                }
            });

            interactionOverlay.addEventListener('touchmove', (e) => {
                if (e.touches.length === 2 && initialPinchDist) {
                    e.preventDefault(); // Prevent browser zoom/scroll
                    const currentDist = Math.hypot(
                        e.touches[0].clientX - e.touches[1].clientX,
                        e.touches[0].clientY - e.touches[1].clientY
                    );
                    const scaleRatio = currentDist / initialPinchDist;
                    const newScale = initialScale * scaleRatio;
                    
                    const centerX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                    const centerY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

                    bookController.zoomExact(newScale, centerX, centerY);
                }
            });

            interactionOverlay.addEventListener('touchend', (e) => {
                if (e.touches.length < 2) initialPinchDist = null;
            });
        }

        // --- UI & Controls ---
        function initControls() {
            document.getElementById('prev-page').onclick = () => { if (currentPageNum > 1) pageFlip.prev(); };
            document.getElementById('next-page').onclick = () => { if (currentPageNum < totalPages) pageFlip.next(); };
            
            document.getElementById('jump-go').onclick = () => {
                let t = parseInt(document.getElementById('jump-page-input').value);
                if (t > 0 && t <= totalPages) pageFlip.turnToPage(t - 1);
            };

            const getCenter = () => {
                const rect = viewerContainer.getBoundingClientRect();
                return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
            };

            document.getElementById('zoom-in').onclick = () => {
                const center = getCenter();
                bookController.zoomExact(bookController.scale + 0.3, center.x, center.y);
            };
            document.getElementById('zoom-out').onclick = () => {
                const center = getCenter();
                bookController.zoomExact(bookController.scale - 0.3, center.x, center.y);
            };
            document.getElementById('fit-screen').onclick = triggerFitToScreen;

            // Native Fullscreen Logic
            const btnFullscreen = document.getElementById('toggle-fullscreen');
            btnFullscreen.onclick = () => {
                if (!document.fullscreenElement) {
                    viewerContainer.requestFullscreen().catch(err => {
                        alert(`Fullscreen error: ${err.message}`);
                    });
                } else {
                    document.exitFullscreen();
                }
            };

            // Re-calculate bounds on resize or fullscreen toggle
            window.addEventListener('resize', triggerFitToScreen);
            document.addEventListener('fullscreenchange', () => {
                if (document.fullscreenElement) {
                    btnFullscreen.innerText = "[ Exit Full ]";
                } else {
                    btnFullscreen.innerText = "[ Full Screen ]";
                }
                setTimeout(triggerFitToScreen, 100); // Small delay to allow CSS reflow
            });
        }
    </script>
</body>
</html>
